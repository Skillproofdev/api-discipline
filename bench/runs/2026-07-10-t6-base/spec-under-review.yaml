openapi: 3.1.0
info:
  title: Pressroom CMS API
  version: 1.2.0
  description: >
    Headless CMS API for articles, comments, and authors. Versioning: URL
    prefix (/v1); breaking changes ship as /v2. Conventions: snake_case
    properties, cursor pagination (`cursor` + `limit`), bearer-token
    authentication on every endpoint.
servers:
  - url: https://api.pressroom.dev/v1
security:
  - bearerAuth: []
tags:
  - name: articles
    description: Article operations.
  - name: comments
    description: Comment operations.
  - name: authors
    description: Author operations.
paths:
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      description: >
        Lists articles. Simple filters go in query parameters; complex filter
        expressions (nested and/or conditions) are sent in the request body.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          required: false
          description: >
            Comma-separated sort fields; prefix with `-` for descending
            (e.g. `-created_at`).
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by publication status.
          schema:
            type: string
            enum: [draft, published, archived]
      requestBody:
        required: false
        description: Optional complex filter expression.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterExpression'
      responses:
        '200':
          description: A page of articles.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: The request is malformed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreate'
      responses:
        '201':
          description: Article created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          description: The request is malformed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: The article is semantically invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /articles/{articleId}:
    parameters:
      - name: articleId
        in: path
        required: true
        description: Article identifier.
        schema:
          type: string
          format: uuid
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article
      responses:
        '200':
          description: The article.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: The article does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article
      description: >
        Replaces the full article resource with the representation in the
        request body. Fields omitted from the request are reset to their
        default values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleUpdate'
      responses:
        '200':
          description: The updated article.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          description: The request is malformed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: The article does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      responses:
        '204':
          description: Article deleted.
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: The article does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /articles/{articleId}/content:
    parameters:
      - name: articleId
        in: path
        required: true
        description: Article identifier.
        schema:
          type: string
          format: uuid
    post:
      operationId: replaceArticleContent
      tags: [articles]
      summary: Replace article content
      description: >
        Replaces the entire content block of the article with the request
        body. This operation is idempotent: sending the same body twice
        leaves the article in the same state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleContent'
      responses:
        '200':
          description: The replaced content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleContent'
        '400':
          description: The request is malformed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: The article does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: order_by
          in: query
          required: false
          description: Field to order results by (e.g. `created`).
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
        - name: article_id
          in: query
          required: false
          description: Filter comments to one article.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A page of comments.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: The request is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        '201':
          description: Comment created.
          headers:
            Location:
              description: URL of the created comment.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: >
            Returned when the comment in the request body fails validation
            (missing body text, unknown article, banned words).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List authors
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of authors.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: The request is malformed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /authors/{authorId}:
    parameters:
      - name: authorId
        in: path
        required: true
        description: Author identifier.
        schema:
          type: string
          format: uuid
    get:
      operationId: FetchAuthor
      tags: [authors]
      summary: Get an author
      responses:
        '200':
          description: The author.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: The author does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor for the next page.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (1-100, default 25).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  schemas:
    Problem:
      type: object
      description: RFC 9457 problem details.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
    Pagination:
      type: object
      required: [next_cursor]
      properties:
        next_cursor:
          type: [string, 'null']
          description: Cursor for the next page; null when no more pages.
        limit:
          type: integer
    FilterExpression:
      type: object
      description: Nested filter expression tree.
      properties:
        op:
          type: string
          enum: [and, or, eq, neq, gt, lt, contains]
        field:
          type: string
        value: {}
        children:
          type: array
          items:
            $ref: '#/components/schemas/FilterExpression'
    Article:
      type: object
      required: [id, title, status, author_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        author_id:
          type: string
          format: uuid
        body_markdown:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ArticleCreate:
      type: object
      required: [title, author_id]
      properties:
        title:
          type: string
        slug:
          type: string
        author_id:
          type: string
          format: uuid
        body_markdown:
          type: string
    ArticleUpdate:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        body_markdown:
          type: string
    ArticleContent:
      type: object
      required: [body_markdown]
      properties:
        body_markdown:
          type: string
        summary:
          type: string
    Comment:
      type: object
      required: [id, article_id, body, created_at]
      properties:
        id:
          type: integer
          format: int64
        article_id:
          type: string
          format: uuid
        author_name:
          type: string
        body:
          type: string
        created_at:
          type: integer
          description: Creation time as Unix epoch seconds.
    CommentCreate:
      type: object
      required: [article_id, body]
      properties:
        article_id:
          type: string
          format: uuid
        author_name:
          type: string
        body:
          type: string
    Author:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        bio:
          type: string
        created_at:
          type: string
          format: date-time
