openapi: 3.1.0
info:
  title: Crmly API
  version: 1.0.0
  description: >
    Crmly customer and order management API. Authentication: bearer tokens
    on every endpoint.
servers:
  - url: https://api.crmly.dev
security:
  - bearerAuth: []
tags:
  - name: users
    description: Customer account operations.
  - name: orders
    description: Order operations.
paths:
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Page size (1-100, default 25).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: A page of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  page:
                    type: integer
                  page_size:
                    type: integer
                  total:
                    type: integer
        '400':
          description: The request is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '200':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  msg:
                    type: string
                  field_errors:
                    type: array
                    items:
                      type: string
        '401':
          description: Authentication is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /getUser:
    get:
      operationId: getUserByEmail
      tags: [users]
      summary: Look up a single user by email address
      parameters:
        - name: email
          in: query
          required: true
          description: Email address of the user to fetch.
          schema:
            type: string
            format: email
      responses:
        '200':
          description: The user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: No user with that email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: User identifier.
        schema:
          type: string
          format: uuid
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      responses:
        '200':
          description: The user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      description: >
        Partially updates a user. Only the fields present in the request body
        are changed; omitted fields keep their current values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The request is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      responses:
        '204':
          description: User deleted.
        '404':
          description: The user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{userId}/notes:
    parameters:
      - name: userId
        in: path
        required: true
        description: User identifier.
        schema:
          type: string
          format: uuid
    get:
      operationId: listUserNotes
      tags: [users]
      summary: List all notes on a user account
      responses:
        '200':
          description: All notes for the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '404':
          description: The user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /order:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of orders to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: offset
          in: query
          required: false
          description: Number of orders to skip.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: A page of orders.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  limit:
                    type: integer
                  offset:
                    type: integer
        '400':
          description: The request is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /order/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        description: Order identifier.
        schema:
          type: string
          format: uuid
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order with line items
      responses:
        '200':
          description: The order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetails'
        '404':
          description: The order does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      responses:
        '200':
          description: Order deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  order:
                    $ref: '#/components/schemas/Order'
        '404':
          description: The order does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      description: Shared error envelope.
      properties:
        code:
          type: string
        message:
          type: string
    User:
      type: object
      required: [id, firstName, last_name, email]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        createdAt:
          type: string
          format: date-time
    UserCreate:
      type: object
      required: [firstName, last_name, email]
      properties:
        firstName:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
    Note:
      type: object
      required: [id, body, created_at]
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        author_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    Order:
      type: object
      required: [id, user_id, status, total_cents, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, paid, shipped, cancelled]
        total_cents:
          type: integer
        currency:
          type: string
        created_at:
          type: string
          format: date-time
